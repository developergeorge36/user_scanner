<!DOCTYPE html>
<!--
  EVENT CHECK-IN SYSTEM — FINAL: Usher Scanner Page (GitHub-hosted)
  ------------------------------------------------------
  Uses plain fetch(). This works now because the deployment's "Who has
  access" is set to "Anyone" — that was the actual root cause of every
  earlier CORS/CORB/sign-in error, not CORS itself.

  SETUP:
  1. Replace WEB_APP_URL below with your deployed Web App URL (the same
     one ending in /exec).
  2. Upload this file to your GitHub Pages repo (can replace the old
     usher-scanner.html or index.html there).
  3. Open the hosted link on the usher's phone — camera + manual entry
     backup both work here (unlike Apps Script's own page hosting).
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Event Check-In Scanner</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  body {
    font-family: -apple-system, Roboto, sans-serif;
    margin: 0;
    padding: 20px;
    background: #111;
    color: #fff;
    text-align: center;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  #reader { width: 100%; max-width: 400px; margin: 16px auto; border-radius: 12px; overflow: hidden; }
  #manual-entry { max-width: 400px; margin: 12px auto; display: flex; gap: 8px; }
  #manual-entry input { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 15px; }
  #manual-entry button, #rescan-btn {
    padding: 10px 16px; border-radius: 8px; border: none; background: #444; color: #fff; font-size: 15px;
  }
  #result {
    max-width: 400px;
    margin: 16px auto;
    padding: 20px;
    border-radius: 12px;
    font-size: 16px;
    text-align: left;
    display: none;
  }
  .status-new { background: #1b4332; border: 2px solid #40916c; }
  .status-duplicate { background: #4a1c1c; border: 2px solid #c0392b; }
  .status-error { background: #4a3c1c; border: 2px solid #c09b2b; }
  #result h2 { margin-top: 0; }
  #result p { margin: 6px 0; }
</style>
</head>
<body>

<h1>Usher Check-In Scanner</h1>
<p style="opacity:0.7; font-size:14px;">Point camera at guest's QR code, or type their ID below</p>

<div id="reader"></div>

<div id="manual-entry">
  <input id="manual-id" type="text" placeholder="e.g. EVT-0001" />
  <button onclick="submitManualId()">Check</button>
</div>

<div id="result"></div>
<button id="rescan-btn" style="display:none;" onclick="resumeScanning()">Scan Next Guest</button>

<script>
// ======= EDIT THIS: paste your deployed Apps Script Web App URL here =======
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby5YA4kC822A_NuzYEJZPEWcl5t7Snk4RMPZMThDBT6wzfrxNa_GU61lttem8kGzATG/exec";
// =============================================================================

const resultDiv = document.getElementById("result");
const rescanBtn = document.getElementById("rescan-btn");
let scanner;
let isProcessing = false;

function onScanSuccess(decodedText) {
  if (isProcessing) return;
  isProcessing = true;
  if (scanner) scanner.pause();
  lookupAttendee(decodedText);
}

function submitManualId() {
  const id = document.getElementById("manual-id").value.trim();
  if (!id || isProcessing) return;
  isProcessing = true;
  if (scanner) scanner.pause();
  lookupAttendee(id);
}

function lookupAttendee(attendeeId) {
  resultDiv.style.display = "block";
  resultDiv.className = "";
  resultDiv.innerHTML = "<p>Looking up " + attendeeId + "...</p>";

  const callbackName = "jsonpCallback_" + Date.now();
  let timedOut = false;

  const timeoutId = setTimeout(() => {
    timedOut = true;
    resultDiv.className = "status-error";
    resultDiv.innerHTML = "<h2>Connection Error</h2><p>Could not reach the check-in system. Check your internet connection.</p>";
    rescanBtn.style.display = "inline-block";
    delete window[callbackName];
    script.remove();
  }, 10000);

  window[callbackName] = function (data) {
    if (timedOut) return;
    clearTimeout(timeoutId);
    delete window[callbackName];
    script.remove();

    if (!data.found) {
      resultDiv.className = "status-error";
      resultDiv.innerHTML = "<h2>Not Found</h2><p>ID: " + attendeeId + "</p><p>This QR code doesn't match any registered attendee.</p>";
    } else if (data.alreadyCheckedIn) {
      resultDiv.className = "status-duplicate";
      resultDiv.innerHTML =
        "<h2>Already Checked In</h2>" +
        "<p><b>" + data.name + "</b></p>" +
        "<p>" + data.email + "</p>" +
        "<p>" + data.whatsapp + "</p>" +
        "<p style='opacity:0.8;'>This guest was already scanned earlier.</p>";
    } else {
      resultDiv.className = "status-new";
      resultDiv.innerHTML =
        "<h2>Checked In &#10003;</h2>" +
        "<p><b>" + data.name + "</b></p>" +
        "<p>" + data.email + "</p>" +
        "<p>" + data.whatsapp + "</p>";
    }
    rescanBtn.style.display = "inline-block";
  };

  const script = document.createElement("script");
  script.src = WEB_APP_URL + "?id=" + encodeURIComponent(attendeeId) + "&callback=" + callbackName;
  script.onerror = () => {
    if (timedOut) return;
    clearTimeout(timeoutId);
    resultDiv.className = "status-error";
    resultDiv.innerHTML = "<h2>Connection Error</h2><p>Could not reach the check-in system. Check your internet connection.</p>";
    rescanBtn.style.display = "inline-block";
    delete window[callbackName];
  };
  document.body.appendChild(script);
}

function resumeScanning() {
  resultDiv.style.display = "none";
  rescanBtn.style.display = "none";
  document.getElementById("manual-id").value = "";
  isProcessing = false;
  if (scanner) scanner.resume();
}

function onScanFailure() {
  // Fires continuously while no QR is in view — ignore silently.
}

window.onload = () => {
  scanner = new Html5Qrcode("reader");
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess,
    onScanFailure
  ).catch(function () {
    document.getElementById("reader").innerHTML =
      "<p style='padding:20px; opacity:0.8;'>Camera unavailable. Use manual ID entry below.</p>";
  });
};
</script>

</body>
</html>
